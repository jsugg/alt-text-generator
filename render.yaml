# Render reads the Node runtime version from package.json `engines.node`.
# buildCommand must stay lockfile-exact (`npm ci`) so production builds are
# reproducible; `npm install` may silently drift from package-lock.json.
services:
  - type: web
    name: alt-text-generator
    runtime: node
    repo: https://github.com/jsugg/alt-text-generator
    branch: production
    autoDeployTrigger: commit
    plan: free
    region: oregon
    numInstances: 1
    healthCheckPath: /api/health
    buildCommand: npm ci
    startCommand: npm run prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_COUNT
        value: 1
      - key: RATE_LIMIT_STORE
        value: auto
      - key: RATE_LIMIT_REDIS_TOPOLOGY
        value: external
      - key: TRUST_PROXY_HOPS
        value: 1
      # Inbound TLS terminates at Render's edge, so the app serves HTTP-only on
      # PORT and never loads certificates. TLS_KEY/TLS_CERT are deliberately
      # absent: since the conditional-validation fix they are not required to
      # boot, and they were never read.
      - key: TLS_ENABLED
        value: false
      - key: REPLICATE_API_TOKEN
        sync: false
