name: CI

on:
  push:
    branches:
      - main
      - production
    paths-ignore:
      - '**/*.md'
      - '.github/assets/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - production
    paths-ignore:
      - '**/*.md'
      - '.github/assets/**'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate GitHub YAML syntax
        run: |
          ruby -e 'require "yaml"; Dir[".github/**/*.yml"].sort.each { |f| YAML.load_file(f); puts "ok #{f}" }'

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.11"
          ACTIONLINT_ARCHIVE="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          ACTIONLINT_URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${ACTIONLINT_ARCHIVE}"
          curl --fail --silent --show-error --location --output /tmp/actionlint.tar.gz "${ACTIONLINT_URL}"
          echo "900919a84f2229bac68ca9cd4103ea297abc35e9689ebb842c6e34a3d1b01b0a  /tmp/actionlint.tar.gz" | sha256sum --check --
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint

      - name: Run actionlint
        run: /tmp/actionlint -color

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run lint
        run: npm run lint

  test:
    name: test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'
          - '24'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install redis-server
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        if: matrix.node-version != '20'
        run: npm test -- --ci
        env:
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token

      - name: Run tests with JUnit reporting
        if: matrix.node-version == '20'
        run: npm run test:ci
        env:
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token
          JEST_JUNIT_OUTPUT_DIR: reports/jest
          JEST_JUNIT_OUTPUT_NAME: junit.xml
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: true

      - name: Upload Jest test results
        if: always() && matrix.node-version == '20'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jest-results-node-${{ matrix.node-version }}
          path: reports/jest/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Jest coverage
        if: always() && matrix.node-version == '20'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jest-coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  newman:
    name: newman
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEWMAN_MODE: ${{ github.event_name == 'pull_request' && 'smoke' || 'harness' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run deterministic Postman/Newman harness
        run: npm run "postman:${NEWMAN_MODE}"

      - name: Write Newman summary
        if: always()
        run: |
          if ! node scripts/github/write-newman-summary.js \
            --reports-dir reports/newman \
            --collection-path postman/collections/alt-text-generator.postman_collection.json \
            --summary-file "$GITHUB_STEP_SUMMARY"; then
            {
              echo "## Newman Summary"
              echo
              echo "- Summary generation failed unexpectedly."
              echo "- Inspect the Newman CLI logs above and the uploaded Newman artifacts for raw failure details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Newman artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: newman-artifacts-${{ env.NEWMAN_MODE }}
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

  test-report:
    name: test-report
    if: always()
    needs:
      - test
      - newman
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Download Jest test results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: jest-results-node-*
          path: reports/jest
          merge-multiple: true

      - name: Download Newman test results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: newman-artifacts-*
          path: reports/newman
          merge-multiple: true

      - name: Publish combined test report
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          check_name: Combined Test Report
          comment_mode: off
          files: |
            reports/jest/**/*.xml
            reports/newman/**/*.xml

  ci-summary:
    name: ci-summary
    if: always()
    needs:
      - actionlint
      - lint
      - test
      - newman
      - test-report
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## CI Summary"
            echo
            echo "- actionlint: ${{ needs.actionlint.result }}"
            echo "- lint: ${{ needs.lint.result }}"
            echo "- test: ${{ needs.test.result }}"
            echo "- newman: ${{ needs.newman.result }}"
            echo "- test-report: ${{ needs.test-report.result }}"
            echo "- newman mode: ${{ github.event_name == 'pull_request' && 'smoke' || 'harness' }}"
          } >> "$GITHUB_STEP_SUMMARY"
