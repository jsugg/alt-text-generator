name: CI

on:
  push:
    branches:
      - main
      - production
    paths-ignore:
      - '**/*.md'
      - '.github/assets/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - production
    paths-ignore:
      - '**/*.md'
      - '.github/assets/**'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate GitHub YAML syntax
        run: |
          ruby -e 'require "yaml"; Dir[".github/**/*.yml"].sort.each { |f| YAML.load_file(f); puts "ok #{f}" }'

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.11"
          ACTIONLINT_ARCHIVE="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          ACTIONLINT_URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${ACTIONLINT_ARCHIVE}"
          curl --fail --silent --show-error --location --output /tmp/actionlint.tar.gz "${ACTIONLINT_URL}"
          echo "900919a84f2229bac68ca9cd4103ea297abc35e9689ebb842c6e34a3d1b01b0a  /tmp/actionlint.tar.gz" | sha256sum --check --
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint

      - name: Run actionlint
        run: /tmp/actionlint -color

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run lint
        run: npm run lint

  test:
    name: test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'
          - '24'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test -- --ci
        env:
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token

      - name: Upload Jest coverage
        if: always() && matrix.node-version == '20'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jest-coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  newman:
    name: newman
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEWMAN_MODE: ${{ github.event_name == 'pull_request' && 'smoke' || 'harness' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run deterministic Postman/Newman harness
        run: npm run "postman:${NEWMAN_MODE}"

      - name: Write Newman summary
        if: always()
        run: |
          node scripts/github/write-newman-summary.js \
            --reports-dir reports/newman \
            --collection-path postman/collections/alt-text-generator.postman_collection.json \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload Newman artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: newman-artifacts-${{ env.NEWMAN_MODE }}
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

  ci-summary:
    name: ci-summary
    if: always()
    needs:
      - actionlint
      - lint
      - test
      - newman
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## CI Summary"
            echo
            echo "- actionlint: ${{ needs.actionlint.result }}"
            echo "- lint: ${{ needs.lint.result }}"
            echo "- test: ${{ needs.test.result }}"
            echo "- newman: ${{ needs.newman.result }}"
            echo "- newman mode: ${{ github.event_name == 'pull_request' && 'smoke' || 'harness' }}"
          } >> "$GITHUB_STEP_SUMMARY"
