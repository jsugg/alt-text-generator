name: CI

on:
  push:
    branches:
      - main
      - production
    paths-ignore:
      - '**/*.md'
      - '.github/assets/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - production
    paths-ignore:
      - '**/*.md'
      - '.github/assets/**'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate GitHub YAML syntax
        run: ruby scripts/github/validate-workflow-yaml.rb

      - name: Install actionlint
        run: bash scripts/github/install-actionlint.sh

      - name: Run actionlint
        run: /tmp/actionlint -color

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run lint
        run: npm run lint

  test:
    name: test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'
          - '24'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install redis-server
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        if: matrix.node-version != '20'
        run: npm test -- --ci
        env:
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token

      - name: Run tests with JUnit and Allure reporting
        if: matrix.node-version == '20'
        run: npm run test:ci
        env:
          ALLURE_RESULTS_DIR: reports/allure-results
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token
          JEST_JUNIT_OUTPUT_DIR: reports/jest
          JEST_JUNIT_OUTPUT_NAME: junit.xml
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: true

      - name: Upload Jest test results
        if: always() && matrix.node-version == '20'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jest-results-node-${{ matrix.node-version }}
          path: reports/jest/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Jest coverage
        if: always() && matrix.node-version == '20'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jest-coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Jest Allure results
        if: always() && matrix.node-version == '20'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jest-allure-results-node-${{ matrix.node-version }}
          path: reports/allure-results/
          if-no-files-found: ignore
          retention-days: 7

  newman:
    name: newman
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALLURE_RESULTS_DIR: reports/allure-results
      NEWMAN_MODE: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run deterministic Postman/Newman suite
        run: npm run "postman:${NEWMAN_MODE}"

      - name: Write Newman summary
        if: always()
        run: bash scripts/github/write-ci-newman-summary.sh "$GITHUB_STEP_SUMMARY"

      - name: Upload Newman artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: newman-artifacts-${{ env.NEWMAN_MODE }}
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Newman Allure results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: newman-allure-results-${{ env.NEWMAN_MODE }}
          path: reports/allure-results/
          if-no-files-found: ignore
          retention-days: 7

  test-report:
    name: test-report
    if: always()
    needs:
      - test
      - newman
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Download Jest test results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: jest-results-node-*
          path: reports/jest
          merge-multiple: true

      - name: Download Newman test results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: newman-artifacts-*
          path: reports/newman
          merge-multiple: true

      - name: Publish combined test report
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          check_name: Combined Test Report
          comment_mode: off
          files: |
            reports/jest/**/*.xml
            reports/newman/**/*.xml

  allure-report:
    name: allure-report
    if: always()
    needs:
      - test
      - newman
    permissions:
      actions: read
      contents: read
    outputs:
      has-results: ${{ steps.allure-inputs.outputs.has-results }}
      history_artifact_name: ${{ steps.history-policy.outputs.history_artifact_name }}
      history_key: ${{ steps.history-policy.outputs.history_key }}
      persist_history: ${{ steps.history-policy.outputs.persist_history }}
      publish_pages: ${{ steps.history-policy.outputs.publish_pages }}
      report_kind: ${{ steps.history-policy.outputs.report_kind }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Download Jest Allure results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: jest-allure-results-node-*
          path: reports/allure-results
          merge-multiple: true

      - name: Download Newman Allure results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: newman-allure-results-*
          path: reports/allure-results
          merge-multiple: true

      - name: Detect Allure raw results
        id: allure-inputs
        shell: bash
        run: bash scripts/reporting/detect-allure-results.sh reports/allure-results "$GITHUB_OUTPUT"

      - name: Resolve Allure history policy
        id: history-policy
        run: >-
          node scripts/reporting/resolve-allure-history-policy.js
          --workflow-kind ci
          --github-output "${GITHUB_OUTPUT}"

      - name: Restore Allure history from artifact
        id: history-restore
        if: >-
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.restore_history == 'true'
        run: >-
          node scripts/reporting/restore-allure-history-from-artifact.js
          --artifact-name "${{ steps.history-policy.outputs.history_artifact_name }}"
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --results-dir reports/allure-results
          --github-output "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Restore Allure history from GitHub Pages fallback
        if: >-
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.restore_history == 'true' &&
          steps.history-policy.outputs.history_fallback_report_url != ''
        shell: bash
        run: >-
          bash scripts/reporting/restore-allure-history-fallback.sh
          reports/allure-results
          "${{ steps.history-policy.outputs.history_fallback_report_url }}"

      - name: Write Allure metadata
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: node scripts/reporting/write-allure-metadata.js --results-dir reports/allure-results
        env:
          ALLURE_HISTORY_KEY: ${{ steps.history-policy.outputs.history_key }}
          ALLURE_NEWMAN_MODE: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
          ALLURE_REPORT_KIND: ${{ steps.history-policy.outputs.report_kind }}
          ALLURE_WORKFLOW_KIND: ci
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ALLURE_PR_NUMBER: ${{ github.event.pull_request.number || '' }}

      - name: Generate Allure report
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: npx --no-install allure generate reports/allure-results --clean -o reports/allure-report

      - name: Package Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        run: >-
          node scripts/reporting/package-allure-history-artifact.js
          --report-dir reports/allure-report
          --output-dir reports/allure-history-artifact
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --report-kind "${{ steps.history-policy.outputs.report_kind }}"
        env:
          ALLURE_NEWMAN_MODE: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ALLURE_PR_NUMBER: ${{ github.event.pull_request.number || '' }}

      - name: Upload Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ steps.history-policy.outputs.history_artifact_name }}
          path: reports/allure-history-artifact/
          if-no-files-found: ignore
          retention-days: ${{ steps.history-policy.outputs.history_retention_days }}

      - name: Upload Allure report
        if: always() && steps.allure-inputs.outputs.has-results == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: allure-report
          path: reports/allure-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write Allure summary
        shell: bash
        env:
          HAS_RESULTS: ${{ steps.allure-inputs.outputs.has-results }}
          HISTORY_KEY: ${{ steps.history-policy.outputs.history_key || 'none' }}
          HISTORY_RESTORED: ${{ steps.history-restore.outputs.restored || 'false' }}
          NEWMAN_MODE: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
          PERSIST_HISTORY: ${{ steps.history-policy.outputs.persist_history }}
          PUBLISH_PAGES: ${{ steps.history-policy.outputs.publish_pages }}
          REPORT_KIND: ${{ steps.history-policy.outputs.report_kind }}
        run: bash scripts/reporting/write-ci-allure-summary.sh "$GITHUB_STEP_SUMMARY"

  allure-pages:
    name: allure-pages
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.allure-report.result == 'success' &&
      needs.allure-report.outputs.has-results == 'true'
    needs:
      - allure-report
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page-url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Allure report artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: allure-report
          path: reports/allure-report

      - name: Pack GitHub Pages artifact
        shell: bash
        run: bash scripts/github/pack-pages-artifact.sh reports/allure-report "${RUNNER_TEMP}/github-pages.tar"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          if-no-files-found: error
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        run: >-
          node scripts/github/deploy-pages-artifact.js
          --artifact-name github-pages
          --pages-build-version "${GITHUB_SHA}"
          --output-file "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Write GitHub Pages summary
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: bash scripts/github/write-pages-summary.sh "$GITHUB_STEP_SUMMARY"

  ci-summary:
    name: ci-summary
    if: always()
    needs:
      - actionlint
      - lint
      - test
      - newman
      - test-report
      - allure-report
      - allure-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Write summary
        env:
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          ALLURE_PAGES_RESULT: ${{ needs.allure-pages.result }}
          ALLURE_PAGES_URL: ${{ needs.allure-pages.outputs.page-url || 'not-published' }}
          ALLURE_REPORT_RESULT: ${{ needs.allure-report.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          NEWMAN_MODE: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
          NEWMAN_RESULT: ${{ needs.newman.result }}
          TEST_REPORT_RESULT: ${{ needs.test-report.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: bash scripts/github/write-ci-summary.sh "$GITHUB_STEP_SUMMARY"
