name: CI

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
      - production

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_changed: ${{ steps.classify.outputs.docs_changed }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Classify changed paths
        id: classify
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${BASE_SHA}" ]; then
            git fetch --no-tags --depth=1 origin "${BASE_SHA}" || true
          fi

          if [ -n "${BASE_SHA}" ] && [ "${BASE_SHA}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" > changed-files.txt
          else
            git ls-tree -r --name-only "${HEAD_SHA}" > changed-files.txt
          fi

          node <<'NODE'
          const fs = require('node:fs');

          const changedFiles = fs.readFileSync('changed-files.txt', 'utf8')
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean);

          const isDocsPath = (filePath) => (
            filePath === 'LICENSE'
            || filePath.endsWith('.md')
            || filePath.startsWith('docs/')
            || filePath.startsWith('.github/assets/')
          );
          const docsChanged = changedFiles.some(isDocsPath);
          const docsOnly = changedFiles.length > 0 && changedFiles.every(isDocsPath);
          const outputs = [
            ['docs_changed', String(docsChanged)],
            ['docs_only', String(docsOnly)],
          ];

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${outputs.map(([key, value]) => `${key}=${value}`).join('\n')}\n`);
          NODE

  docs:
    name: docs
    needs:
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Validate docs
        if: needs.changes.outputs.docs_changed == 'true'
        run: npm run docs:validate

      - name: Skip docs validation when no docs changed
        if: needs.changes.outputs.docs_changed != 'true'
        run: echo "No docs-only validation needed for this change."

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install actionlint
        run: bash scripts/github/install-actionlint.sh

      - name: Run actionlint
        run: /tmp/actionlint -color

  lint:
    name: lint
    needs:
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        if: needs.changes.outputs.docs_only != 'true'
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run lint
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run lint

      - name: Skip lint for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; lint gate satisfied by docs validation."

  openapi:
    name: openapi
    needs:
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        if: needs.changes.outputs.docs_only != 'true'
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Validate OpenAPI contract
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run openapi:validate

      - name: Check OpenAPI freshness
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run openapi:check

      - name: Check OpenAPI backward compatibility
        if: needs.changes.outputs.docs_only != 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -n "$BASE_REF" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            npm run openapi:diff -- --base FETCH_HEAD
          else
            npm run openapi:diff
          fi

      - name: Skip OpenAPI gates for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; OpenAPI gate satisfied by docs validation."

  test-unit:
    name: test:unit (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'
          - '24'
    steps:
      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        if: needs.changes.outputs.docs_only != 'true'
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ matrix.node-version }}

      - name: 'test:unit'
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run test:unit -- --ci
        env:
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token

      - name: Skip unit tests for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; unit matrix gate satisfied by docs validation."

  test-ci:
    name: test:ci (20)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - changes
    services:
      redis:
        image: redis:8.8.0-alpine3.23
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_INTEGRATION_MODE: required
      REDIS_INTEGRATION_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        if: needs.changes.outputs.docs_only != 'true'
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: 'test:ci'
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run test:ci
        env:
          ALLURE_RESULTS_DIR: reports/allure-results
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token
          JEST_JUNIT_OUTPUT_DIR: reports/jest
          JEST_JUNIT_OUTPUT_NAME: junit.xml
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: true

      - name: Skip full Jest gate for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; canonical full Jest gate satisfied by docs validation."

      - name: Upload Jest test results
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jest-results-node-20
          path: reports/jest/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Jest coverage
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jest-coverage-node-20
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Jest Allure results
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jest-allure-results-node-20
          path: reports/allure-results/
          if-no-files-found: ignore
          retention-days: 7

  newman:
    name: newman
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
    env:
      ALLURE_RESULTS_DIR: reports/allure-results
      NEWMAN_MODE: smoke
    steps:
      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        if: needs.changes.outputs.docs_only != 'true'
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Lint Postman collection policy
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run postman:lint

      - name: Run deterministic Postman/Newman suite
        if: needs.changes.outputs.docs_only != 'true'
        run: npm run "postman:${NEWMAN_MODE}"

      - name: Skip Newman smoke for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; Newman smoke gate satisfied by docs validation."

      - name: Write Newman summary
        if: always() && needs.changes.outputs.docs_only != 'true'
        run: bash scripts/github/write-ci-newman-summary.sh "$GITHUB_STEP_SUMMARY"

      - name: Upload Newman artifacts
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: newman-artifacts-${{ env.NEWMAN_MODE }}
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Newman Allure results
        if: always() && needs.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: newman-allure-results-${{ env.NEWMAN_MODE }}
          path: reports/allure-results/
          if-no-files-found: ignore
          retention-days: 7

  test-report:
    name: test-report
    if: always() && needs.changes.outputs.docs_only != 'true'
    needs:
      - changes
      - test-ci
      - newman
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Download Jest test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: jest-results-node-*
          path: reports/jest
          merge-multiple: true

      - name: Download Newman test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: newman-artifacts-*
          path: reports/newman
          merge-multiple: true

      - name: Publish combined test report
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        with:
          check_name: Combined Test Report
          comment_mode: off
          files: |
            reports/jest/**/*.xml
            reports/newman/**/*.xml

  allure-report:
    name: allure-report
    if: always() && needs.changes.outputs.docs_only != 'true'
    needs:
      - changes
      - test-ci
      - newman
    permissions:
      actions: read
      contents: read
    outputs:
      has-results: ${{ steps.allure-inputs.outputs.has-results }}
      history_artifact_name: ${{ steps.history-policy.outputs.history_artifact_name }}
      history_key: ${{ steps.history-policy.outputs.history_key }}
      pages_path: ${{ steps.history-policy.outputs.pages_path }}
      pages_report_url: ${{ steps.history-policy.outputs.pages_report_url }}
      persist_history: ${{ steps.history-policy.outputs.persist_history }}
      publish_pages: ${{ steps.history-policy.outputs.publish_pages }}
      report_kind: ${{ steps.history-policy.outputs.report_kind }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Download Jest Allure results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: jest-allure-results-node-*
          path: reports/allure-results
          merge-multiple: true

      - name: Download Newman Allure results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: newman-allure-results-*
          path: reports/allure-results
          merge-multiple: true

      - name: Detect Allure raw results
        id: allure-inputs
        shell: bash
        run: bash scripts/reporting/detect-allure-results.sh reports/allure-results "$GITHUB_OUTPUT"

      - name: Resolve Allure history policy
        id: history-policy
        run: >-
          node scripts/reporting/resolve-allure-history-policy.js
          --workflow-kind ci
          --github-output "${GITHUB_OUTPUT}"

      - name: Restore Allure history from artifact
        id: history-restore
        if: >-
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.restore_history == 'true'
        run: >-
          node scripts/reporting/restore-allure-history-from-artifact.js
          --artifact-name "${{ steps.history-policy.outputs.history_artifact_name }}"
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --results-dir reports/allure-results
          --github-output "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Restore Allure history from GitHub Pages fallback
        if: >-
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.restore_history == 'true' &&
          steps.history-policy.outputs.history_fallback_report_url != ''
        shell: bash
        run: >-
          bash scripts/reporting/restore-allure-history-fallback.sh
          reports/allure-results
          "${{ steps.history-policy.outputs.history_fallback_report_url }}"

      - name: Write Allure metadata
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: node scripts/reporting/write-allure-metadata.js --results-dir reports/allure-results
        env:
          ALLURE_HISTORY_KEY: ${{ steps.history-policy.outputs.history_key }}
          ALLURE_NEWMAN_MODE: smoke
          ALLURE_REPORT_KIND: ${{ steps.history-policy.outputs.report_kind }}
          ALLURE_WORKFLOW_KIND: ci
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ALLURE_PR_NUMBER: ${{ github.event.pull_request.number || '' }}

      - name: Generate Allure report
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: npx --no-install allure generate reports/allure-results --clean -o reports/allure-report

      - name: Package Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        run: >-
          node scripts/reporting/package-allure-history-artifact.js
          --report-dir reports/allure-report
          --output-dir reports/allure-history-artifact
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --report-kind "${{ steps.history-policy.outputs.report_kind }}"
        env:
          ALLURE_NEWMAN_MODE: smoke
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ALLURE_PR_NUMBER: ${{ github.event.pull_request.number || '' }}

      - name: Upload Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.history-policy.outputs.history_artifact_name }}
          path: reports/allure-history-artifact/
          if-no-files-found: ignore
          retention-days: ${{ steps.history-policy.outputs.history_retention_days }}

      - name: Upload Allure report
        if: always() && steps.allure-inputs.outputs.has-results == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-report
          path: reports/allure-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write Allure summary
        shell: bash
        env:
          HAS_RESULTS: ${{ steps.allure-inputs.outputs.has-results }}
          HISTORY_KEY: ${{ steps.history-policy.outputs.history_key || 'none' }}
          HISTORY_RESTORED: ${{ steps.history-restore.outputs.restored || 'false' }}
          NEWMAN_MODE: smoke
          PAGES_REPORT_URL: ${{ steps.history-policy.outputs.pages_report_url || 'not-published' }}
          PERSIST_HISTORY: ${{ steps.history-policy.outputs.persist_history }}
          PUBLISH_PAGES: ${{ steps.history-policy.outputs.publish_pages }}
          REPORT_KIND: ${{ steps.history-policy.outputs.report_kind }}
        run: bash scripts/reporting/write-ci-allure-summary.sh "$GITHUB_STEP_SUMMARY"

  allure-pages:
    name: allure-pages
    if: >-
      needs.allure-report.result == 'success' &&
      needs.allure-report.outputs.has-results == 'true' &&
      needs.allure-report.outputs.publish_pages == 'true'
    needs:
      - allure-report
    runs-on: ubuntu-latest
    # Per-ref group: this job only PREPARES an artifact (it never deploys), so it
    # must not share the global "allure-pages-site" serialization group with the
    # publish workflow. A global group made concurrent PRs contend, and GitHub
    # marks the pending runs it drops as "failure" (not "cancelled"), which
    # surfaced as a spurious red check on otherwise-green PRs.
    concurrency:
      group: allure-pages-site-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
    outputs:
      page-url: ${{ needs.allure-report.outputs.pages_report_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch published Pages branch
        run: git fetch origin gh-pages || true

      - name: Restore current Pages content
        shell: bash
        run: |
          mkdir -p reports/pages-site-current
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git archive origin/gh-pages | tar -xf - -C reports/pages-site-current
          fi

      - name: Download Allure report artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: allure-report
          path: reports/allure-report

      - name: Compose GitHub Pages site
        run: >-
          node scripts/github/compose-pages-site.js
          --existing-site-dir reports/pages-site-current
          --output-dir reports/pages-site-next
          --publish-path "${{ needs.allure-report.outputs.pages_path }}"
          --report-dir reports/allure-report

      - name: Write GitHub Pages metadata
        run: >-
          node scripts/github/write-pages-metadata.js
          --metadata-path reports/pages-metadata/page-metadata.json
          --page-path "${{ needs.allure-report.outputs.pages_path || '/' }}"
          --page-url "${{ needs.allure-report.outputs.pages_report_url }}"
          --report-kind "${{ needs.allure-report.outputs.report_kind }}"

      - name: Upload prepared GitHub Pages site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-pages-site
          path: reports/pages-site-next/
          if-no-files-found: error
          retention-days: 1

      - name: Upload GitHub Pages metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-pages-metadata
          path: reports/pages-metadata/page-metadata.json
          if-no-files-found: error
          retention-days: 1

      - name: Write GitHub Pages summary
        env:
          PAGE_ARTIFACT_PREPARED: 'true'
          PAGE_DEPLOYED: 'false'
          PAGE_PATH: ${{ needs.allure-report.outputs.pages_path || '/' }}
          PAGE_TRANSPORT: ${{ github.event_name == 'pull_request' && 'workflow_dispatch-pages-deploy' || 'workflow_run-pages-deploy' }}
          PAGE_URL: ${{ needs.allure-report.outputs.pages_report_url }}
          REPORT_KIND: ${{ needs.allure-report.outputs.report_kind }}
        run: bash scripts/github/write-pages-summary.sh "$GITHUB_STEP_SUMMARY"

  allure-pages-publish-dispatch:
    name: allure-pages-publish-dispatch
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.allure-pages.result == 'success'
    needs:
      - allure-pages
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dispatch Allure Pages publish workflow
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node scripts/github/dispatch-pages-publish.js
          --repo "${{ github.repository }}"
          --ref "main"
          --run-id "${{ github.run_id }}"

  ci-summary:
    name: ci-summary
    if: always()
    needs:
      - changes
      - actionlint
      - docs
      - lint
      - openapi
      - test-unit
      - test-ci
      - newman
      - test-report
      - allure-report
      - allure-pages
      - allure-pages-publish-dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write summary
        env:
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          DOCS_RESULT: ${{ needs.docs.result }}
          OPENAPI_RESULT: ${{ needs.openapi.result }}
          ALLURE_PAGES_RESULT: ${{ needs.allure-pages.result }}
          ALLURE_PAGES_URL: ${{ needs.allure-pages.outputs.page-url || 'not-published' }}
          ALLURE_REPORT_RESULT: ${{ needs.allure-report.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          NEWMAN_MODE: smoke
          NEWMAN_RESULT: ${{ needs.newman.result }}
          TEST_REPORT_RESULT: ${{ needs.test-report.result }}
          TEST_CI_RESULT: ${{ needs.test-ci.result }}
          TEST_UNIT_RESULT: ${{ needs.test-unit.result }}
        run: bash scripts/github/write-ci-summary.sh "$GITHUB_STEP_SUMMARY"
