name: Deploy Verification

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of the deployed API to verify.
        required: false
        default: 'https://wcag.qcraft.com.br'
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: production-smoke
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 10
    env:
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
      PRODUCTION_API_AUTH_ENABLED: ${{ vars.PRODUCTION_API_AUTH_ENABLED }}
      PRODUCTION_DEPLOY_VALIDATION_API_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_VALIDATION_API_TOKEN }}
      PRODUCTION_DEPLOY_VALIDATION_API_TOKEN_CONFIGURED: ${{ secrets.PRODUCTION_DEPLOY_VALIDATION_API_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run deploy Newman verification
        run: npm run postman:deploy -- --base-url "${BASE_URL}"

      - name: Write deploy summary
        if: always()
        run: |
          {
            echo "## Deploy Verification"
            echo
            echo "- Event: ${{ github.event_name }}"
            echo "- Base URL: ${BASE_URL}"
            echo "- Production API auth expected: ${PRODUCTION_API_AUTH_ENABLED:-false}"
            echo "- Production deploy validation token configured: ${PRODUCTION_DEPLOY_VALIDATION_API_TOKEN_CONFIGURED}"
            if [ "${PRODUCTION_API_AUTH_ENABLED:-false}" = "true" ] && [ "${PRODUCTION_DEPLOY_VALIDATION_API_TOKEN_CONFIGURED}" != "true" ]; then
              echo "- Protected deploy verification skipped because PRODUCTION_API_AUTH_ENABLED=true but PRODUCTION_DEPLOY_VALIDATION_API_TOKEN is not configured. Render API_AUTH_ENABLED must be true and API_AUTH_TOKENS must include the same token."
            fi
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          node scripts/github/write-newman-summary.js \
            --reports-dir reports/newman \
            --collection-path postman/collections/alt-text-generator.postman_collection.json \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload Newman artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-verification-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7
