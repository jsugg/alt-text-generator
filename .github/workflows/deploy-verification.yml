name: Deploy Verification

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of the deployed API to verify.
        required: false
        default: 'https://wcag.qcraft.com.br'
        type: string
      persist_history:
        description: Persist the deploy-production Allure history stream for this manual run.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: production-smoke
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 10
    env:
      ALLURE_RESULTS_DIR: reports/allure-results
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
      PRODUCTION_API_AUTH_ENABLED: ${{ vars.PRODUCTION_API_AUTH_ENABLED }}
      PRODUCTION_DEPLOY_VALIDATION_API_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_VALIDATION_API_TOKEN }}
      PRODUCTION_DEPLOY_VALIDATION_API_TOKEN_CONFIGURED: ${{ secrets.PRODUCTION_DEPLOY_VALIDATION_API_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Run deploy Newman verification
        run: npm run postman:deploy -- --base-url "${BASE_URL}"

      - name: Write deploy summary
        if: always()
        run: |
          {
            echo "## Deploy Verification"
            echo
            echo "- Event: ${{ github.event_name }}"
            echo "- Base URL: ${BASE_URL}"
            echo "- Production API auth expected: ${PRODUCTION_API_AUTH_ENABLED:-false}"
            echo "- Production deploy validation token configured: ${PRODUCTION_DEPLOY_VALIDATION_API_TOKEN_CONFIGURED}"
            if [ "${PRODUCTION_API_AUTH_ENABLED:-false}" = "true" ] && [ "${PRODUCTION_DEPLOY_VALIDATION_API_TOKEN_CONFIGURED}" != "true" ]; then
              echo "- Protected deploy verification skipped because PRODUCTION_API_AUTH_ENABLED=true but PRODUCTION_DEPLOY_VALIDATION_API_TOKEN is not configured. Render API_AUTH_ENABLED must be true and API_AUTH_TOKENS must include the same token."
            fi
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          if ! node scripts/github/write-newman-summary.js \
            --reports-dir reports/newman \
            --collection-path postman/collections/alt-text-generator.postman_collection.json \
            --summary-file "$GITHUB_STEP_SUMMARY"; then
            {
              echo "## Newman Summary"
              echo
              echo "- Summary generation failed unexpectedly."
              echo "- Inspect the Newman CLI logs above and the uploaded Newman artifacts for raw failure details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Newman artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: deploy-verification-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Newman Allure results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: deploy-verification-allure-results
          path: reports/allure-results/
          if-no-files-found: ignore
          retention-days: 7

  allure-report:
    name: deploy-allure-report
    if: always()
    needs:
      - smoke
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Download Newman Allure results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: deploy-verification-allure-results
          path: reports/allure-results
          merge-multiple: true

      - name: Detect Allure raw results
        id: allure-inputs
        shell: bash
        run: |
          if find reports/allure-results -type f ! -name '.gitkeep' -print -quit | grep -q .; then
            echo "has-results=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-results=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Allure history policy
        id: history-policy
        run: >-
          node scripts/reporting/resolve-allure-history-policy.js
          --workflow-kind deploy
          --base-url "${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}"
          --persist-history "${{ github.event_name == 'workflow_dispatch' && inputs.persist_history && 'true' || 'false' }}"
          --github-output "${GITHUB_OUTPUT}"

      - name: Restore Allure history from artifact
        if: >-
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.restore_history == 'true'
        run: >-
          node scripts/reporting/restore-allure-history-from-artifact.js
          --artifact-name "${{ steps.history-policy.outputs.history_artifact_name }}"
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --results-dir reports/allure-results
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Write Allure metadata
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: node scripts/reporting/write-allure-metadata.js --results-dir reports/allure-results
        env:
          ALLURE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
          ALLURE_HISTORY_KEY: ${{ steps.history-policy.outputs.history_key }}
          ALLURE_NEWMAN_MODE: deploy
          ALLURE_REPORT_KIND: ${{ steps.history-policy.outputs.report_kind }}
          ALLURE_WORKFLOW_KIND: deploy
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Generate Allure report
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: npx --no-install allure generate reports/allure-results --clean -o reports/allure-report

      - name: Package Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        run: >-
          node scripts/reporting/package-allure-history-artifact.js
          --report-dir reports/allure-report
          --output-dir reports/allure-history-artifact
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --report-kind "${{ steps.history-policy.outputs.report_kind }}"
        env:
          ALLURE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
          ALLURE_NEWMAN_MODE: deploy
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Upload Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ steps.history-policy.outputs.history_artifact_name }}
          path: reports/allure-history-artifact/
          if-no-files-found: ignore
          retention-days: ${{ steps.history-policy.outputs.history_retention_days }}

      - name: Upload Allure report
        if: always() && steps.allure-inputs.outputs.has-results == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: deploy-verification-allure-report
          path: reports/allure-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write Allure summary
        shell: bash
        run: |
          {
            echo "## Deploy Allure Report"
            echo
            if [[ "${{ steps.allure-inputs.outputs.has-results }}" == "true" ]]; then
              echo "- HTML report uploaded as the \`deploy-verification-allure-report\` artifact."
              echo "- Report kind: \`${{ steps.history-policy.outputs.report_kind }}\`."
              echo "- History stream: \`${{ steps.history-policy.outputs.history_key || 'none' }}\`."
              echo "- History persisted as artifact: \`${{ steps.history-policy.outputs.persist_history }}\`."
              echo "- GitHub Pages published: \`false\`."
            else
              echo "- No Allure raw results were available to merge."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
