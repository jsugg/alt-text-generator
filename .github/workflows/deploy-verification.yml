name: Deploy Verification

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of the deployed API to verify.
        required: false
        default: 'https://wcag.qcraft.com.br'
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: production-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Run deploy verification
        run: |
          node scripts/github/verify-deploy.js \
            --base-url "${BASE_URL}" \
            --event "${{ github.event_name }}" \
            --summary-file "${GITHUB_STEP_SUMMARY}"
