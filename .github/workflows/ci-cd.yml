name: CI/CD Pipeline
on:
  push:
    branches:
      - main
      - housekeeping
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --forceExit
        env:
          NODE_ENV: test
          REPLICATE_API_TOKEN: test-token
