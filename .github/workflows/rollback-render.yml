name: Rollback Render Service

# Platform-native rollback: redeploys a previous known-good Render deploy through
# the Render API. Unlike "Rollback Production" (which moves the production git
# ref and is rejected when a branch ruleset forbids force pushes), this restores
# service instantly and independently of branch protection. The production
# branch can be realigned separately once the incident is contained.

on:
  workflow_dispatch:
    inputs:
      to_deploy_id:
        description: Render deploy id to roll back to. Leave blank to pick the most recent successful deploy.
        required: false
        type: string
      reason:
        description: Why the service is being rolled back (recorded in the run summary).
        required: true
        type: string
      dry_run:
        description: Plan only; do not trigger a rollback deploy.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

# Serializes with promotion/rollback so a platform rollback cannot race a git
# promotion that is mid-flight.
concurrency:
  group: promote-to-production
  cancel-in-progress: false

jobs:
  rollback-render:
    name: rollback-render
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 15
    steps:
      - name: Harden runner (audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Require Render configuration
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
        run: |
          if [ -z "${RENDER_API_KEY}" ]; then
            echo "::error::RENDER_API_KEY secret is not set on the prod-validation environment." >&2
            exit 1
          fi
          if [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "::error::RENDER_SERVICE_ID variable is not set." >&2
            exit 1
          fi

      - name: Roll back Render service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          ROLLBACK_TO_DEPLOY_ID: ${{ inputs.to_deploy_id }}
          ROLLBACK_REASON: ${{ inputs.reason }}
          ROLLBACK_DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: |
          args=(
            --service-id "${RENDER_SERVICE_ID}"
            --reason "${ROLLBACK_REASON}"
            --dry-run "${ROLLBACK_DRY_RUN}"
            --output-file "${GITHUB_OUTPUT}"
            --summary-file "${GITHUB_STEP_SUMMARY}"
          )
          if [ -n "${ROLLBACK_TO_DEPLOY_ID}" ]; then
            args+=(--to-deploy-id "${ROLLBACK_TO_DEPLOY_ID}")
          fi
          node scripts/render/rollback-render-service.js "${args[@]}"
