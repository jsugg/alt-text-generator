name: Live Provider Validation

on:
  workflow_dispatch:
    inputs:
      run_azure:
        description: Include Azure live validation when Azure secrets are configured.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: live-provider-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-provider:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Validate live-provider secrets
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          if [ -z "${REPLICATE_API_TOKEN}" ]; then
            echo "REPLICATE_API_TOKEN secret is required for live provider validation."
            exit 1
          fi

      - name: Run live provider validation
        run: npm run postman:live
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ inputs.run_azure && secrets.ACV_API_ENDPOINT || '' }}
          ACV_SUBSCRIPTION_KEY: ${{ inputs.run_azure && secrets.ACV_SUBSCRIPTION_KEY || '' }}
          ACV_API_KEY: ${{ inputs.run_azure && secrets.ACV_API_KEY || '' }}

      - name: Upload live validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-provider-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7
