name: Live Provider Validation

on:
  workflow_dispatch:
    inputs:
      provider_scope:
        description: Select the live provider scope. Use auto to defer to the prod-validation LIVE_PROVIDER_SCOPE variable.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - azure
          - replicate
          - all
  schedule:
    - cron: '23 8 * * 1'

permissions:
  contents: read

concurrency:
  group: live-provider-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schedule-disabled:
    if: github.event_name == 'schedule' && vars.ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## Live Provider Validation"
            echo
            echo "- Scheduled run skipped because ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION is not set to true."
          } >> "$GITHUB_STEP_SUMMARY"

  live-provider:
    if: github.event_name != 'schedule' || vars.ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION == 'true'
    name: live-provider
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Resolve provider scope
        env:
          INPUT_PROVIDER_SCOPE: ${{ inputs.provider_scope }}
          ENV_LIVE_PROVIDER_SCOPE: ${{ vars.LIVE_PROVIDER_SCOPE }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}
        run: node scripts/github/resolve-live-provider-scope.js

      - name: Run live provider validation
        run: npm run postman:live
        env:
          LIVE_PROVIDER_SCOPE: ${{ env.LIVE_PROVIDER_SCOPE }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}

      - name: Upload live validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-provider-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Live Provider Validation"
            echo
            echo "- Event: ${{ github.event_name }}"
            echo "- Provider scope: ${LIVE_PROVIDER_SCOPE:-unresolved}"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -d reports/newman ]; then
            node scripts/github/write-newman-summary.js \
              --reports-dir reports/newman \
              --collection-path postman/collections/alt-text-generator.postman_collection.json \
              --summary-file "$GITHUB_STEP_SUMMARY"
          else
            echo "- No Newman reports were produced." >> "$GITHUB_STEP_SUMMARY"
          fi
