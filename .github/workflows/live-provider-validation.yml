name: Production Description Service Validation

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of the deployed API to validate against.
        required: false
        default: 'https://wcag.qcraft.com.br'
        type: string
      provider_scope:
        description: Select the live provider scope. Use auto to defer to the prod-validation LIVE_PROVIDER_SCOPE variable.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - azure
          - replicate
          - huggingface
          - openai
          - openrouter
          - together
          - all
  schedule:
    - cron: '23 8 * * 1'

permissions:
  contents: read

concurrency:
  group: live-provider-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schedule-disabled:
    if: github.event_name == 'schedule' && vars.ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## Production Description Service Validation"
            echo
            echo "- Scheduled run skipped because ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION is not set to true."
          } >> "$GITHUB_STEP_SUMMARY"

  live-provider:
    if: github.event_name != 'schedule' || vars.ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION == 'true'
    name: production-description-service
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        uses: ./.github/actions/setup-node-project

      - name: Resolve provider scope
        env:
          VALIDATION_SUMMARY_TITLE: Production Description Service Validation
          INPUT_PROVIDER_SCOPE: ${{ inputs.provider_scope }}
          LIVE_PROVIDER_SCOPE: ${{ vars.LIVE_PROVIDER_SCOPE }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          PROVIDER_VALIDATION_PUBLIC_REF: production
        run: node scripts/github/resolve-provider-validation-scope.js

      - name: Run production description service validation
        run: npm run postman:live-provider -- --base-url "${BASE_URL}"
        env:
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
          PRODUCTION_API_AUTH_ENABLED: ${{ vars.PRODUCTION_API_AUTH_ENABLED }}
          PRODUCTION_DEPLOY_VALIDATION_API_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_VALIDATION_API_TOKEN }}
          LIVE_PROVIDER_SCOPE: ${{ env.LIVE_PROVIDER_SCOPE }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}

      - name: Upload production description service artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-description-service-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        run: bash scripts/github/write-provider-validation-summary.sh "$GITHUB_STEP_SUMMARY"
        env:
          VALIDATION_SUMMARY_TITLE: Production Description Service Validation
