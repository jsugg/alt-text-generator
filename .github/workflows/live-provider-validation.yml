name: Live Provider Validation

on:
  workflow_dispatch:
    inputs:
      run_replicate:
        description: Include Replicate live validation. Use auto to keep Replicate opt-in unless explicitly enabled.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - true
          - false
      run_azure:
        description: Include Azure live validation when Azure secrets are configured. Use auto to prefer Azure when available.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - true
          - false
  schedule:
    - cron: '23 8 * * 1'

permissions:
  contents: read

concurrency:
  group: live-provider-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schedule-disabled:
    if: github.event_name == 'schedule' && vars.ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## Live Provider Validation"
            echo
            echo "- Scheduled run skipped because ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION is not set to true."
          } >> "$GITHUB_STEP_SUMMARY"

  live-provider:
    if: github.event_name != 'schedule' || vars.ENABLE_SCHEDULED_LIVE_PROVIDER_VALIDATION == 'true'
    name: live-provider
    runs-on: ubuntu-latest
    environment: pre-prod
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Resolve validation scope
        env:
          INPUT_RUN_REPLICATE: ${{ inputs.run_replicate }}
          INPUT_RUN_AZURE: ${{ inputs.run_azure }}
          ENV_RUN_LIVE_REPLICATE: ${{ vars.RUN_LIVE_REPLICATE }}
          ENV_RUN_REPLICATE: ${{ vars.RUN_REPLICATE }}
          ENV_RUN_LIVE_AZURE: ${{ vars.RUN_LIVE_AZURE }}
          ENV_RUN_AZURE: ${{ vars.RUN_AZURE }}
          SECRET_RUN_LIVE_REPLICATE: ${{ secrets.RUN_LIVE_REPLICATE }}
          SECRET_RUN_REPLICATE: ${{ secrets.RUN_REPLICATE }}
          SECRET_RUN_LIVE_AZURE: ${{ secrets.RUN_LIVE_AZURE }}
          SECRET_RUN_AZURE: ${{ secrets.RUN_AZURE }}
          REPLICATE_API_TOKEN_CONFIGURED: ${{ secrets.REPLICATE_API_TOKEN != '' && 'true' || 'false' }}
          ACV_API_ENDPOINT_CONFIGURED: ${{ secrets.ACV_API_ENDPOINT != '' && 'true' || 'false' }}
          ACV_SUBSCRIPTION_KEY_CONFIGURED: ${{ secrets.ACV_SUBSCRIPTION_KEY != '' && 'true' || 'false' }}
          ACV_API_KEY_CONFIGURED: ${{ secrets.ACV_API_KEY != '' && 'true' || 'false' }}
          ENABLE_SCHEDULED_AZURE_LIVE_VALIDATION: ${{ vars.ENABLE_SCHEDULED_AZURE_LIVE_VALIDATION }}
        run: |
          normalize_boolean() {
            case "$1" in
              true|TRUE|True|1|yes|YES|on|ON)
                printf 'true\n'
                ;;
              false|FALSE|False|0|no|NO|off|OFF)
                printf 'false\n'
                ;;
              '')
                printf '\n'
                ;;
              *)
                echo "Unsupported boolean value: $1" >&2
                exit 1
                ;;
            esac
          }

          resolve_manual_toggle() {
            local input_value="$1"
            local primary_env_value="$2"
            local secondary_env_value="$3"
            local primary_secret_value="$4"
            local secondary_secret_value="$5"
            local default_value="$6"

            case "$input_value" in
              true|false)
                printf '%s\n' "$input_value"
                return
                ;;
              auto|'')
                ;;
              *)
                echo "Unsupported manual toggle value: $input_value" >&2
                exit 1
                ;;
            esac

            local normalized_primary
            normalized_primary="$(normalize_boolean "$primary_env_value")"
            if [ -n "$normalized_primary" ]; then
              printf '%s\n' "$normalized_primary"
              return
            fi

            local normalized_secondary
            normalized_secondary="$(normalize_boolean "$secondary_env_value")"
            if [ -n "$normalized_secondary" ]; then
              printf '%s\n' "$normalized_secondary"
              return
            fi

            local normalized_primary_secret
            normalized_primary_secret="$(normalize_boolean "$primary_secret_value")"
            if [ -n "$normalized_primary_secret" ]; then
              printf '%s\n' "$normalized_primary_secret"
              return
            fi

            local normalized_secondary_secret
            normalized_secondary_secret="$(normalize_boolean "$secondary_secret_value")"
            if [ -n "$normalized_secondary_secret" ]; then
              printf '%s\n' "$normalized_secondary_secret"
              return
            fi

            printf '%s\n' "$default_value"
          }

          azure_configured='false'
          if [ "${ACV_API_ENDPOINT_CONFIGURED}" = "true" ] && { [ "${ACV_SUBSCRIPTION_KEY_CONFIGURED}" = "true" ] || [ "${ACV_API_KEY_CONFIGURED}" = "true" ]; }; then
            azure_configured='true'
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            run_replicate="$(resolve_manual_toggle "auto" "$ENV_RUN_LIVE_REPLICATE" "$ENV_RUN_REPLICATE" "$SECRET_RUN_LIVE_REPLICATE" "$SECRET_RUN_REPLICATE" "false")"
            scheduled_azure_default='false'
            if [ "${ENABLE_SCHEDULED_AZURE_LIVE_VALIDATION}" = "true" ] && [ "${azure_configured}" = "true" ]; then
              scheduled_azure_default='true'
            fi
            run_azure="$(resolve_manual_toggle "auto" "$ENV_RUN_LIVE_AZURE" "$ENV_RUN_AZURE" "$SECRET_RUN_LIVE_AZURE" "$SECRET_RUN_AZURE" "${scheduled_azure_default}")"
          else
            manual_azure_default='false'
            if [ "${azure_configured}" = "true" ]; then
              manual_azure_default='true'
            fi

            run_replicate="$(resolve_manual_toggle "$INPUT_RUN_REPLICATE" "$ENV_RUN_LIVE_REPLICATE" "$ENV_RUN_REPLICATE" "$SECRET_RUN_LIVE_REPLICATE" "$SECRET_RUN_REPLICATE" "false")"
            run_azure="$(resolve_manual_toggle "$INPUT_RUN_AZURE" "$ENV_RUN_LIVE_AZURE" "$ENV_RUN_AZURE" "$SECRET_RUN_LIVE_AZURE" "$SECRET_RUN_AZURE" "${manual_azure_default}")"

            if [ "${run_replicate}" = "false" ] && [ "${run_azure}" = "false" ]; then
              if [ "${azure_configured}" = "true" ]; then
                run_azure='true'
              elif [ "${REPLICATE_API_TOKEN_CONFIGURED}" = "true" ]; then
                run_replicate='true'
              fi
            fi
          fi

          echo "RUN_REPLICATE=${run_replicate}" >> "$GITHUB_ENV"
          echo "RUN_AZURE=${run_azure}" >> "$GITHUB_ENV"

      - name: Validate live-provider secrets
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}
          ACV_API_KEY: ${{ secrets.ACV_API_KEY }}
        run: |
          if [ "${RUN_REPLICATE}" = "false" ] && [ "${RUN_AZURE}" = "false" ]; then
            echo "At least one live provider must be enabled."
            exit 1
          fi

          if [ "${RUN_REPLICATE}" = "true" ] && [ -z "${REPLICATE_API_TOKEN}" ]; then
            echo "REPLICATE_API_TOKEN secret is required for live provider validation."
            exit 1
          fi

          if [ "${RUN_AZURE}" = "true" ] && [ -z "${ACV_API_ENDPOINT}" ]; then
            echo "ACV_API_ENDPOINT secret is required for Azure live validation."
            exit 1
          fi

          if [ "${RUN_AZURE}" = "true" ] && [ -z "${ACV_SUBSCRIPTION_KEY}" ] && [ -z "${ACV_API_KEY}" ]; then
            echo "ACV_SUBSCRIPTION_KEY or ACV_API_KEY secret is required for Azure live validation."
            exit 1
          fi

      - name: Run live provider validation
        run: npm run postman:live
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          RUN_LIVE_REPLICATE: ${{ env.RUN_REPLICATE }}
          RUN_LIVE_AZURE: ${{ env.RUN_AZURE }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}
          ACV_API_KEY: ${{ secrets.ACV_API_KEY }}

      - name: Upload live validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-provider-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Live Provider Validation"
            echo
            echo "- Event: ${{ github.event_name }}"
            echo "- Replicate: ${RUN_REPLICATE}"
            echo "- Azure: ${RUN_AZURE}"
          } >> "$GITHUB_STEP_SUMMARY"
