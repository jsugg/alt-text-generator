name: Promote to Production

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-production
  cancel-in-progress: false

jobs:
  promote:
    name: promote
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Resolve promotion auth strategy
        id: promotion-auth
        env:
          AUTOMATION_GITHUB_APP_ID: ${{ vars.AUTOMATION_GITHUB_APP_ID }}
          AUTOMATION_GITHUB_APP_PRIVATE_KEY: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
        run: |
          if [ -n "${AUTOMATION_GITHUB_APP_ID}" ] && [ -n "${AUTOMATION_GITHUB_APP_PRIVATE_KEY}" ]; then
            echo "use_github_app=true" >> "${GITHUB_OUTPUT}"
            echo "token_source=github_app" >> "${GITHUB_OUTPUT}"
          else
            echo "use_github_app=false" >> "${GITHUB_OUTPUT}"
            echo "token_source=github_token" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create promotion GitHub App token
        id: promotion-app-token
        if: steps.promotion-auth.outputs.use_github_app == 'true'
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Require repository automation GitHub App
        if: steps.promotion-auth.outputs.use_github_app != 'true'
        run: |
          {
            echo "Exact-SHA promotion to production is blocked."
            echo "Configure vars.AUTOMATION_GITHUB_APP_ID and secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY."
            echo "Then add that GitHub App to the protected production branch bypass list before retrying."
          } >&2
          exit 1

      - name: Promote main into production with GitHub App token
        if: steps.promotion-auth.outputs.use_github_app == 'true'
        env:
          GH_TOKEN: ${{ steps.promotion-app-token.outputs.token }}
        run: |
          node scripts/github/promote-to-production.js \
            --repo "${{ github.repository }}" \
            --source-branch "main" \
            --target-branch "production" \
            --required-checks "actionlint,lint,newman,test (20),test (22),test (24)" \
            --output-file "${GITHUB_OUTPUT}" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Write promotion auth summary
        if: always()
        run: |
          {
            echo "## Promotion Authentication"
            echo
            if [ "${{ steps.promotion-auth.outputs.token_source }}" = "github_app" ]; then
              echo "- Token source: GitHub App installation token"
              echo "- Expected behavior: the production ref update should emit downstream push workflow runs."
            else
              echo "- Token source: GitHub App not configured"
              echo "- Exact-SHA promotion is blocked until the repository automation app is configured."
              echo "- To restore automatic production push workflows, configure vars.AUTOMATION_GITHUB_APP_ID and secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY."
              echo "- The app must also be allowed to update the protected production branch ref."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
