name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      auto_merge:
        description: Enable PR auto-merge after required checks pass.
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-to-production
  cancel-in-progress: false

jobs:
  promote:
    name: promote
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Resolve promotion auth strategy
        id: promotion-auth
        env:
          PROMOTION_GITHUB_APP_ID: ${{ vars.PROMOTION_GITHUB_APP_ID }}
          PROMOTION_GITHUB_APP_PRIVATE_KEY: ${{ secrets.PROMOTION_GITHUB_APP_PRIVATE_KEY }}
        run: |
          if [ -n "${PROMOTION_GITHUB_APP_ID}" ] && [ -n "${PROMOTION_GITHUB_APP_PRIVATE_KEY}" ]; then
            echo "use_github_app=true" >> "${GITHUB_OUTPUT}"
            echo "token_source=github_app" >> "${GITHUB_OUTPUT}"
          else
            echo "use_github_app=false" >> "${GITHUB_OUTPUT}"
            echo "token_source=github_token" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create promotion GitHub App token
        id: promotion-app-token
        if: steps.promotion-auth.outputs.use_github_app == 'true'
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.PROMOTION_GITHUB_APP_ID }}
          private-key: ${{ secrets.PROMOTION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Promote main into production with GitHub App token
        if: steps.promotion-auth.outputs.use_github_app == 'true'
        env:
          GH_TOKEN: ${{ steps.promotion-app-token.outputs.token }}
        run: |
          node scripts/github/promote-to-production.js \
            --repo "${{ github.repository }}" \
            --source-branch "main" \
            --target-branch "production" \
            --required-checks "actionlint,lint,newman,test (20),test (22),test (24)" \
            --auto-merge "${{ inputs.auto_merge }}" \
            --output-file "${GITHUB_OUTPUT}" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Promote main into production with github.token fallback
        if: steps.promotion-auth.outputs.use_github_app != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/github/promote-to-production.js \
            --repo "${{ github.repository }}" \
            --source-branch "main" \
            --target-branch "production" \
            --required-checks "actionlint,lint,newman,test (20),test (22),test (24)" \
            --auto-merge "${{ inputs.auto_merge }}" \
            --output-file "${GITHUB_OUTPUT}" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Write promotion auth summary
        if: always()
        run: |
          {
            echo "## Promotion Authentication"
            echo
            if [ "${{ steps.promotion-auth.outputs.token_source }}" = "github_app" ]; then
              echo "- Token source: GitHub App installation token"
              echo "- Expected behavior: the merge commit on production should emit downstream push workflow runs."
            else
              echo "- Token source: github.token fallback"
              echo "- Limitation: merges created with github.token do not emit downstream push workflow runs."
              echo "- To restore automatic production push workflows, configure vars.PROMOTION_GITHUB_APP_ID and secrets.PROMOTION_GITHUB_APP_PRIVATE_KEY."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
