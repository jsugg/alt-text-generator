name: Promote to Production

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-to-production
  cancel-in-progress: false

jobs:
  pre-production-provider-validation:
    name: pre-production-provider-validation
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 20
    steps:
      - name: Harden runner (audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        uses: ./.github/actions/setup-node-project

      - name: Resolve pre-production provider scope
        env:
          VALIDATION_SUMMARY_TITLE: Pre Production Provider Validation
          INPUT_PROVIDER_SCOPE: all
          LIVE_PROVIDER_SCOPE: all
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: node scripts/github/resolve-provider-validation-scope.js

      - name: Run pre-production provider validation
        run: npm run postman:pre-production-provider
        env:
          LIVE_PROVIDER_SCOPE: ${{ env.LIVE_PROVIDER_SCOPE }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_MODEL: Qwen/Qwen3-VL-30B-A3B-Instruct:fastest
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-nano
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_MODEL: Qwen/Qwen3.5-9B
          PROVIDER_VALIDATION_PUBLIC_REF: ${{ github.sha }}

      - name: Upload pre-production provider artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pre-production-provider-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        run: bash scripts/github/write-provider-validation-summary.sh "$GITHUB_STEP_SUMMARY"
        env:
          LIVE_PROVIDER_SCOPE: ${{ env.LIVE_PROVIDER_SCOPE }}
          VALIDATION_SUMMARY_TITLE: Pre Production Provider Validation

  promote:
    name: promote
    needs:
      - pre-production-provider-validation
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 15
    steps:
      - name: Harden runner (audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Resolve promotion auth strategy
        id: promotion-auth
        env:
          REPO_TOOLING_GITHUB_APP_ID: ${{ vars.REPO_TOOLING_GITHUB_APP_ID }}
          REPO_TOOLING_GITHUB_APP_PRIVATE_KEY: ${{ secrets.REPO_TOOLING_GITHUB_APP_PRIVATE_KEY }}
        run: bash scripts/github/resolve-promotion-auth.sh

      - name: Create promotion GitHub App token
        id: promotion-app-token
        if: steps.promotion-auth.outputs.use_github_app == 'true'
        env:
          REPO_TOOLING_GITHUB_APP_PRIVATE_KEY: ${{ secrets.REPO_TOOLING_GITHUB_APP_PRIVATE_KEY }}
        run: >-
          node scripts/github/create-github-app-installation-token.js
          --app-id "${{ vars.REPO_TOOLING_GITHUB_APP_ID }}"
          --owner "${{ github.repository_owner }}"
          --repo "${{ github.event.repository.name }}"
          --output-file "${GITHUB_OUTPUT}"

      - name: Require repository automation GitHub App
        if: steps.promotion-auth.outputs.use_github_app != 'true'
        run: bash scripts/github/require-promotion-github-app.sh

      - name: Promote main into production with GitHub App token
        if: steps.promotion-auth.outputs.use_github_app == 'true'
        env:
          GH_TOKEN: ${{ steps.promotion-app-token.outputs.token }}
        run: |
          node scripts/github/promote-to-production.js \
            --repo "${{ github.repository }}" \
            --source-branch "main" \
            --target-branch "production" \
            --output-file "${GITHUB_OUTPUT}" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Write promotion auth summary
        if: always()
        env:
          TOKEN_SOURCE: ${{ steps.promotion-auth.outputs.token_source }}
        run: bash scripts/github/write-promotion-auth-summary.sh "${GITHUB_STEP_SUMMARY}"
