name: Dependency Review

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base ref to compare against for a manual dependency review run.
        required: true
        type: string
      head_ref:
        description: Head ref to compare for a manual dependency review run.
        required: true
        type: string
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
      - production

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc

      - name: Review dependency changes
        env:
          DEPENDENCY_REVIEW_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'workflow_dispatch' && inputs.base_ref || github.event.before }}
          DEPENDENCY_REVIEW_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event_name == 'workflow_dispatch' && inputs.head_ref || github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/github/review-dependencies.js \
            --repo "${GITHUB_REPOSITORY}" \
            --base-ref "${DEPENDENCY_REVIEW_BASE_REF}" \
            --head-ref "${DEPENDENCY_REVIEW_HEAD_REF}"
