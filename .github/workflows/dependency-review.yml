name: Dependency Review

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base ref to compare against for a manual dependency review run.
        required: true
        type: string
      head_ref:
        description: Head ref to compare for a manual dependency review run.
        required: true
        type: string
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
      - production

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Review dependency changes
        env:
          DEPENDENCY_REVIEW_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'workflow_dispatch' && inputs.base_ref || github.event.before }}
          DEPENDENCY_REVIEW_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event_name == 'workflow_dispatch' && inputs.head_ref || github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/github/review-dependencies.js \
            --repo "${GITHUB_REPOSITORY}" \
            --base-ref "${DEPENDENCY_REVIEW_BASE_REF}" \
            --head-ref "${DEPENDENCY_REVIEW_HEAD_REF}"
