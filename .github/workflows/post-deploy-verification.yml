name: Post Deploy Verification

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL of the deployed API to verify.
        required: false
        default: 'https://wcag.qcraft.com.br'
        type: string
      persist_history:
        description: Persist the deploy-production Allure history stream for this manual run.
        required: false
        default: false
        type: boolean
      provider_scope:
        description: Select the low-cost live-provider scope to exercise after deployment.
        required: false
        default: all
        type: choice
        options:
          - auto
          - huggingface
          - openai
          - all

permissions:
  contents: read

concurrency:
  group: post-deploy-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: post-deploy-smoke
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 10
    env:
      ALLURE_RESULTS_DIR: reports/allure-results
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
      PRODUCTION_API_AUTH_ENABLED: ${{ vars.PRODUCTION_API_AUTH_ENABLED }}
      PRODUCTION_DEPLOY_VALIDATION_API_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_VALIDATION_API_TOKEN }}
      PRODUCTION_DEPLOY_VALIDATION_API_TOKEN_CONFIGURED: ${{ secrets.PRODUCTION_DEPLOY_VALIDATION_API_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Resolve post-deploy provider scope
        env:
          VALIDATION_SUMMARY_TITLE: Post Deploy Verification
          INPUT_PROVIDER_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.provider_scope || 'all' }}
          LIVE_PROVIDER_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.provider_scope || 'all' }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/github/resolve-provider-validation-scope.js

      - name: Run post-deploy Newman verification
        run: npm run postman:post-deploy -- --base-url "${BASE_URL}"
        env:
          LIVE_PROVIDER_SCOPE: ${{ env.LIVE_PROVIDER_SCOPE }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_MODEL: Qwen/Qwen3-VL-30B-A3B-Instruct:fastest
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-nano
          PROVIDER_VALIDATION_PUBLIC_REF: production

      - name: Write deploy summary
        if: always()
        run: bash scripts/github/write-deploy-summary.sh "$GITHUB_STEP_SUMMARY"

      - name: Upload Newman artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: post-deploy-verification-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Newman Allure results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: post-deploy-verification-allure-results
          path: reports/allure-results/
          if-no-files-found: ignore
          retention-days: 7

  allure-report:
    name: post-deploy-allure-report
    if: always()
    needs:
      - smoke
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Download Newman Allure results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: post-deploy-verification-allure-results
          path: reports/allure-results
          merge-multiple: true

      - name: Detect Allure raw results
        id: allure-inputs
        shell: bash
        run: bash scripts/reporting/detect-allure-results.sh reports/allure-results "$GITHUB_OUTPUT"

      - name: Resolve Allure history policy
        id: history-policy
        run: >-
          node scripts/reporting/resolve-allure-history-policy.js
          --workflow-kind deploy
          --base-url "${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}"
          --persist-history "${{ github.event_name == 'workflow_dispatch' && inputs.persist_history && 'true' || 'false' }}"
          --github-output "${GITHUB_OUTPUT}"

      - name: Restore Allure history from artifact
        if: >-
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.restore_history == 'true'
        run: >-
          node scripts/reporting/restore-allure-history-from-artifact.js
          --artifact-name "${{ steps.history-policy.outputs.history_artifact_name }}"
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --results-dir reports/allure-results
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Write Allure metadata
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: node scripts/reporting/write-allure-metadata.js --results-dir reports/allure-results
        env:
          ALLURE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
          ALLURE_HISTORY_KEY: ${{ steps.history-policy.outputs.history_key }}
          ALLURE_NEWMAN_MODE: deploy
          ALLURE_REPORT_KIND: ${{ steps.history-policy.outputs.report_kind }}
          ALLURE_WORKFLOW_KIND: deploy
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Generate Allure report
        if: steps.allure-inputs.outputs.has-results == 'true'
        run: npx --no-install allure generate reports/allure-results --clean -o reports/allure-report

      - name: Package Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        run: >-
          node scripts/reporting/package-allure-history-artifact.js
          --report-dir reports/allure-report
          --output-dir reports/allure-history-artifact
          --history-key "${{ steps.history-policy.outputs.history_key }}"
          --report-kind "${{ steps.history-policy.outputs.report_kind }}"
        env:
          ALLURE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://wcag.qcraft.com.br' }}
          ALLURE_NEWMAN_MODE: deploy
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Upload Allure history artifact
        if: >-
          always() &&
          steps.allure-inputs.outputs.has-results == 'true' &&
          steps.history-policy.outputs.persist_history == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ steps.history-policy.outputs.history_artifact_name }}
          path: reports/allure-history-artifact/
          if-no-files-found: ignore
          retention-days: ${{ steps.history-policy.outputs.history_retention_days }}

      - name: Upload Allure report
        if: always() && steps.allure-inputs.outputs.has-results == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: post-deploy-verification-allure-report
          path: reports/allure-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write Allure summary
        shell: bash
        env:
          HAS_RESULTS: ${{ steps.allure-inputs.outputs.has-results }}
          HISTORY_KEY: ${{ steps.history-policy.outputs.history_key || 'none' }}
          PERSIST_HISTORY: ${{ steps.history-policy.outputs.persist_history }}
          REPORT_KIND: ${{ steps.history-policy.outputs.report_kind }}
        run: bash scripts/reporting/write-deploy-allure-summary.sh "$GITHUB_STEP_SUMMARY"
