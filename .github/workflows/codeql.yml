name: CodeQL

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
      - production
  schedule:
    - cron: '19 7 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: codeql-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Classify docs-only changes
        id: classify
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${BASE_SHA}" ]; then
            git fetch --no-tags --depth=1 origin "${BASE_SHA}" || true
          fi

          if [ "${EVENT_NAME}" = "schedule" ]; then
            echo "docs_only=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${BASE_SHA}" ] && [ "${BASE_SHA}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" > changed-files.txt
          else
            git ls-tree -r --name-only "${HEAD_SHA}" > changed-files.txt
          fi

          node scripts/ci/classify-changed-paths.js --input changed-files.txt

  analyze:
    name: codeql
    needs:
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        if: needs.changes.outputs.docs_only != 'true'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript
          queries: security-extended

      # No autobuild step: JavaScript is interpreted; the init/analyze pair
      # extracts sources directly and the build step only added runtime.

      - name: Analyze
        if: needs.changes.outputs.docs_only != 'true'
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:javascript

      - name: Skip CodeQL for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; CodeQL gate satisfied by docs validation."
