name: Provider Integration Validation

on:
  workflow_dispatch:
    inputs:
      provider_scope:
        description: Select the provider scope. Use auto to defer to the prod-validation LIVE_PROVIDER_SCOPE variable.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - azure
          - replicate
          - huggingface
          - openai
          - openrouter
          - all

permissions:
  contents: read

concurrency:
  group: provider-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provider-integration:
    runs-on: ubuntu-latest
    environment: prod-validation
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: '20'

      - name: Resolve provider scope
        env:
          VALIDATION_SUMMARY_TITLE: Provider Integration Validation
          INPUT_PROVIDER_SCOPE: ${{ inputs.provider_scope }}
          LIVE_PROVIDER_SCOPE: ${{ vars.LIVE_PROVIDER_SCOPE }}
          REPLICATE_ENABLED: ${{ vars.REPLICATE_ENABLED }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/github/resolve-provider-validation-scope.js

      - name: Run provider integration validation
        run: npm run postman:provider-integration
        env:
          LIVE_PROVIDER_SCOPE: ${{ env.LIVE_PROVIDER_SCOPE }}
          REPLICATE_ENABLED: ${{ vars.REPLICATE_ENABLED }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ACV_API_ENDPOINT: ${{ secrets.ACV_API_ENDPOINT }}
          ACV_SUBSCRIPTION_KEY: ${{ secrets.ACV_SUBSCRIPTION_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload provider integration artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: provider-integration-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        run: bash scripts/github/write-provider-validation-summary.sh "$GITHUB_STEP_SUMMARY"
        env:
          VALIDATION_SUMMARY_TITLE: Provider Integration Validation
