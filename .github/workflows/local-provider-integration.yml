name: Local Provider Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '37 6 * * 2'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/local-provider-integration.yml'
      - 'config/providerCatalog.js'
      - 'package.json'
      - 'package-lock.json'
      - 'postman/**'
      - 'scripts/postman/**'
      - 'scripts/postman-fixture-server.js'
      - 'scripts/run-postman-harness.js'
      - 'src/api/**'
      - 'src/providers/**'
      - 'src/services/*DescriberService.js'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/local-provider-integration.yml'
      - 'config/providerCatalog.js'
      - 'package.json'
      - 'package-lock.json'
      - 'postman/**'
      - 'scripts/postman/**'
      - 'scripts/postman-fixture-server.js'
      - 'scripts/run-postman-harness.js'
      - 'src/api/**'
      - 'src/providers/**'
      - 'src/services/*DescriberService.js'

permissions:
  contents: read

concurrency:
  group: local-provider-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-provider-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup project
        uses: ./.github/actions/setup-node-project

      - name: Run local provider integration suite
        run: npm run postman:full

      - name: Upload local provider integration artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: local-provider-integration-artifacts
          path: reports/newman/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        run: bash scripts/github/write-provider-validation-summary.sh "$GITHUB_STEP_SUMMARY"
        env:
          LIVE_PROVIDER_SCOPE: mocked-all
          VALIDATION_SUMMARY_TITLE: Local Provider Integration
