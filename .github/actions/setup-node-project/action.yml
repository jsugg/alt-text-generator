name: Setup Node Project
description: Set up Node.js with npm cache and install project dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: '20'

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci
